<app-notification-container></app-notification-container>

<app-confirm-dialog
  [isOpen]="showConfirmDialog"
  title="Finalizar Recorrido"
  [message]="'¿Deseas finalizar este recorrido? El conductor, vehículo y ruta quedarán disponibles nuevamente.'"
  confirmText="Finalizar"
  cancelText="Cancelar"
  (confirmed)="confirmDeactivate()"
  (cancelled)="cancelDeactivate()">
</app-confirm-dialog>

<div class="assignments-container">

  <div class="assignments-card">
    <div class="card-header">
      <h2>Recorridos</h2>

      <button class="btn-primary" (click)="openModal()" *ngIf="esAdmin">
        Planificar Recorrido
      </button>
    </div>

    <div class="card-body">
      <table class="assignments-table">
        <thead>
          <tr>
            <th>CONDUCTOR</th>
            <th>VEHÍCULO</th>
            <th>RUTA</th>
            <th>ESTADO</th>
            <th *ngIf="esAdmin">ACCIONES</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let r of recorridos">
            <td>
              <div class="cell-content">
                <span class="cell-icon">👤</span>
                {{ getConductorName(r.perfil_id) }}
              </div>
            </td>
            <td>
              <div class="cell-content">
                <span class="cell-icon">🚙</span>
                {{ getVehiculoPlaca(r) }}
              </div>
            </td>
            <td>
              <span class="ruta-badge">{{ getRutaName(r.ruta_id) }}</span>
            </td>
            <td>
              <span class="status-badge" [ngClass]="r.activo ? 'active' : 'inactive'">
                {{ r.activo ? '● Activo' : '● Inactivo' }}
              </span>
            </td>
            <td *ngIf="esAdmin">
              <button class="btn-deactivate"
                      *ngIf="r.activo"
                      (click)="desactivarRecorrido(r)">
                Finalizar
              </button>
            </td>
          </tr>

          <!-- Estado vacío -->
          <tr *ngIf="recorridos.length === 0">
            <td [attr.colspan]="esAdmin ? 5 : 4" class="empty-state">
              <div class="empty-content">
                <span class="empty-icon">📍</span>
                <p>No hay recorridos planificados aún.</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- ============================
     MODAL FUERA DEL CONTENEDOR
============================= -->
<ng-container *ngIf="showModal">
  <div class="modal-overlay" (click)="closeModal()">
    <div class="modal" (click)="$event.stopPropagation()">

      <h2>Planificar Nuevo Recorrido</h2>

      <form [formGroup]="formRecorrido" (ngSubmit)="submitRecorrido()">

        <div class="form-group">
          <label>Conductor</label>
          <select formControlName="perfil_id">
            <option value="" disabled selected>Seleccione un conductor...</option>
            <option *ngFor="let c of conductores" [value]="c.id_usuario">
              {{ c.nombre }} {{ c.apellido }}
            </option>
          </select>
        </div>

        <div class="form-group">
          <label>Vehículo</label>
          <select formControlName="vehiculo_id">
            <option value="" disabled selected>Seleccione un vehículo...</option>
            <option *ngFor="let v of vehiculos" [value]="v.id || v.id_vehiculo">
              {{ v.placa }} ({{ v.marca }})
            </option>
          </select>
        </div>

        <div class="form-group">
          <label>Ruta</label>
          <select formControlName="ruta_id">
            <option value="" disabled selected>Seleccione una ruta...</option>
            <option *ngFor="let r of rutas" [value]="r.id">
              {{ r.nombre_ruta }}
            </option>
          </select>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-secondary" (click)="closeModal()">
            Cancelar
          </button>
          <button type="submit" class="btn-primary" [disabled]="formRecorrido.invalid">
            Registrar Recorrido
          </button>
        </div>

      </form>

    </div>
  </div>
</ng-container>
