<div class="dashboard-container">

  <!-- Sidebar -->
  <app-sidebar
    [isOpen]="sidebarOpen"
    [activeSection]="activeSection"
    [menuItems]="menuItems"
    (sectionChange)="onSectionChange($event)"
    (logoutClick)="onLogout()">
  </app-sidebar>

  <!-- Main Content -->
  <main class="main-content">

    <div class="content">

      <!-- Header -->
      <app-header
        [sidebarOpen]="sidebarOpen"
        (toggle)="toggleSidebar()"
        (logout)="onLogout()">
      </app-header>

      <!-- Contenido scrolleable (el header queda fuera) -->
      <div class="page-content">

        <!-- Dynamic content (vehiculos, mapa, etc.) -->
        <router-outlet></router-outlet>

        <!-- SOLO mostrar dashboard si estamos en /main -->
        <div class="dashboard-home" *ngIf="currentRoute === '/main'">

          <!-- Info cards row -->
          <div class="info-cards-row">

            <!-- Recorridos activos -->
            <div class="info-card">
              <div class="info-card-header">
                <h3>🚛 Recorridos Activos</h3>
              </div>
              <div class="info-card-body">
                <p class="info-placeholder" *ngIf="activeRecorridos.length === 0">
                  Sin recorridos activos en este momento
                </p>
                <ul class="reporte-list" *ngIf="activeRecorridos.length > 0">
                  <li class="reporte-item" *ngFor="let r of activeRecorridos">
                    <span class="reporte-tipo conductor">🚛</span>
                    <span class="reporte-msg">
                      <strong>{{ r.rutaNombre }}</strong><br>
                      <small>{{ r.placa }} · {{ r.conductor }}</small>
                    </span>
                  </li>
                </ul>
              </div>
              <div class="info-card-footer">
                <button class="link-btn" (click)="verRutaActiva()">Ver en mapa ↓</button>
              </div>
            </div>


            <!-- Reportes -->
            <div class="info-card">
              <div class="info-card-header">
                <h3>📋 Reportes</h3>
              </div>
              <div class="info-card-body">
                <p class="info-placeholder" *ngIf="reportes.length === 0">Sin reportes recientes</p>
                <ul class="reporte-list" *ngIf="reportes.length > 0">
                  <li class="reporte-item" *ngFor="let r of reportes | slice:0:4">
                    <span class="reporte-tipo" [class.ciudadano]="r.tipo === 'ciudadano'" [class.conductor]="r.tipo === 'conductor'">
                      {{ r.tipo === 'ciudadano' ? '👤' : '🚛' }}
                    </span>
                    <span class="reporte-msg">{{ r.mensaje }}</span>
                    <span class="reporte-fecha">{{ r.fecha | date:'HH:mm' }}</span>
                  </li>
                </ul>
              </div>
              <div class="info-card-footer">
                <button class="link-btn" (click)="verReportes()">Ver todos...</button>
              </div>
            </div>

          </div>


          <!-- Mapa -->
          <div class="map-card">
            <div class="map-wrapper">
              <button class="btn-map-mode" (click)="toggleMapMode()" title="Alternar Vista Satélite">
                {{ isSatelliteMode ? '🗺️ Normal' : '🛰️ Satélite' }}
              </button>
              <div id="mainMapPreview"></div>
            </div>
          </div>

        </div>

      </div> <!-- FIN page-content -->

    </div>

  </main>

</div>
