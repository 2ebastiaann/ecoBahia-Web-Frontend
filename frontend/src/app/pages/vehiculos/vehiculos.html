<app-notification-container></app-notification-container>

<app-confirm-dialog 
  [isOpen]="showDeleteConfirm"
  title="Eliminar Vehículo"
  [message]="'¿Deseas eliminar el vehículo ' + (vehicleToDelete?.placa || '') + '? Esta acción no se puede deshacer.'"
  confirmText="Eliminar"
  cancelText="Cancelar"
  (confirmed)="confirmDelete()"
  (cancelled)="cancelDelete()">
</app-confirm-dialog>

<div class="vehicles-container">

  <div class="vehicles-card">
    <div class="card-header">
      <h2>Vehículos</h2>
      
      <!-- ADMIN y CONDUCTOR pueden agregar -->
      <button class="btn-primary" (click)="openAddModal()" *ngIf="esAdmin || esConductor">
        Agregar Vehículo
      </button>
    </div>

    <div class="card-body">
      <table class="vehicles-table">
        <thead>
          <tr>
            <th>PLACA</th>
            <th>MARCA</th>
            <th>MODELO</th>
            <th>ACTIVO</th>
            <th *ngIf="esAdmin || esConductor">ACCIONES</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let vehiculo of vehicles">
            <td>{{ vehiculo.placa }}</td>
            <td>{{ vehiculo.marca }}</td>
            <td>{{ vehiculo.modelo }}</td>
            <td>{{ vehiculo.activo ? 'Sí' : 'No' }}</td>

            <td *ngIf="esAdmin || esConductor">
              <!-- Admin y Conductor pueden editar -->
              <button class="btn-edit" (click)="editVehicle(vehiculo)" *ngIf="esAdmin || esConductor">
                Editar
              </button>

              <!-- Solo Admin elimina -->
              <button class="btn-delete" (click)="deleteVehicle(vehiculo.id!)" *ngIf="esAdmin || esConductor">
                Eliminar
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>


<!-- ============================
     MODAL FUERA DEL CONTENEDOR
============================= -->
<ng-container *ngIf="showModal">
  <div class="modal-overlay" (click)="closeModal()">
    <div class="modal" (click)="$event.stopPropagation()">

      <h2>{{ isEditMode ? "Editar Vehículo" : "Agregar Vehículo" }}</h2>

      <form [formGroup]="vehicleForm" (ngSubmit)="onSubmit()">

        <div class="form-group">
          <label>Placa</label>
          <input 
            type="text" 
            formControlName="placa"
            placeholder="Ej: ABC-123">
        </div>

        <div class="form-group">
          <label>Marca</label>
          <input 
            type="text" 
            formControlName="marca"
            placeholder="Ej: Toyota">
        </div>

        <div class="form-group">
          <label>Modelo</label>
          <input 
            type="text" 
            formControlName="modelo"
            placeholder="Ej: 2024">
        </div>

        <div class="form-group">
          <label>Activo</label>
          <select formControlName="activo">
            <option [value]="true">Sí</option>
            <option [value]="false">No</option>
          </select>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-secondary" (click)="closeModal()">
            Cancelar
          </button>
          <button type="submit" class="btn-primary" [disabled]="!vehicleForm.valid">
            {{ isEditMode ? "Guardar Cambios" : "Agregar" }}
          </button>
        </div>

      </form>

    </div>
  </div>
</ng-container>
