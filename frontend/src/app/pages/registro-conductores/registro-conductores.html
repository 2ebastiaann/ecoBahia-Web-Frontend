<app-notification-container></app-notification-container>

<app-confirm-dialog 
  [isOpen]="showDeleteConfirm"
  title="Eliminar Conductor"
  [message]="'¿Deseas eliminar al conductor ' + (conductorToDelete?.nombre || '') + ' ' + (conductorToDelete?.apellido || '') + '? Esta acción no se puede deshacer.'"
  confirmText="Eliminar"
  cancelText="Cancelar"
  (confirmed)="confirmDelete()"
  (cancelled)="cancelDelete()">
</app-confirm-dialog>

<div class="vehicles-container">

  <div class="vehicles-card">
    <div class="card-header">
      <h2>Conductores</h2>
      
      <!-- ADMIN puede agregar -->
      <button class="btn-primary" (click)="openAddModal()" *ngIf="esAdmin">
        Registrar Conductor
      </button>
    </div>

    <div class="card-body">
      <table class="vehicles-table">
        <thead>
          <tr>
            <th>NOMBRE COMPLETO</th>
            <th>CORREO ELECTRÓNICO</th>
            <th *ngIf="esAdmin">ACCIONES</th>
          </tr>
        </thead>

        <tbody>
          <!-- Si no hay conductores -->
          <tr *ngIf="conductores.length === 0">
            <td [colSpan]="esAdmin ? 3 : 2">No hay conductores registrados.</td>
          </tr>
          
          <!-- Iteración sobre conductores -->
          <tr *ngFor="let conductor of conductores">
            <td>{{ conductor.nombre }} {{ conductor.apellido }}</td>
            <td>{{ conductor.email }}</td>

            <td *ngIf="esAdmin">
              <button class="btn-edit" (click)="editConductor(conductor)">
                Editar
              </button>
              <button class="btn-delete" (click)="deleteConductor(conductor.id_usuario!)">
                Eliminar
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>


<!-- ============================
     MODAL PARA CONDUCTOR
============================= -->
<ng-container *ngIf="showModal">
  <div class="modal-overlay" (click)="closeModal()">
    <div class="modal" (click)="$event.stopPropagation()">

      <h2>{{ isEditMode ? "Editar Conductor" : "Registrar Conductor" }}</h2>

      <form [formGroup]="conductorForm" (ngSubmit)="onSubmit()">

        <div class="form-group row-group">
          <div class="half-width">
            <label>Nombres</label>
            <input 
              type="text" 
              formControlName="nombre"
              placeholder="Ej: Juan Pérez">
          </div>
          
          <div class="half-width">
            <label>Apellidos</label>
            <input 
              type="text" 
              formControlName="apellido"
              placeholder="Ej: García">
          </div>
        </div>

        <div class="form-group">
          <label>Correo Electrónico</label>
          <input 
            type="email" 
            formControlName="email"
            placeholder="conductor@correo.com">
        </div>

        <div class="form-group">
          <label>Contraseña {{ isEditMode ? '(Dejar en blanco para no cambiar)' : '' }}</label>
          <input 
            type="password" 
            formControlName="password"
            placeholder="••••••••">
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-secondary" (click)="closeModal()">
            Cancelar
          </button>
          <button type="submit" class="btn-primary" [disabled]="!conductorForm.valid">
            {{ isEditMode ? "Guardar Cambios" : "Registrar" }}
          </button>
        </div>

      </form>

    </div>
  </div>
</ng-container>
