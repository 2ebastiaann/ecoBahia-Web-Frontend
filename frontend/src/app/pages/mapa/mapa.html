<div class="map-page-container">
  <app-notification-container></app-notification-container>

  <!-- CONTENEDOR MULTI-PANEL -->
  <div class="map-panels-grid">

    <!-- PANEL DEL MAPA (IZQUIERDA) -->
    <div class="panel-card map-panel">
      
      <!-- HEADER MAPA -->
      <div class="panel-header">
        <div class="header-left">
          <!-- Espacio para mantener centrado el titulo si es necesario -->
        </div>

        <div class="header-center">
          <h2>🗺️ GESTOR DE RUTAS</h2>
        </div>

        <div class="header-right">
          <button class="btn-primary"
                  *ngIf="creandoRuta && esAdmin"
                  (click)="guardarRuta()">
            Guardar Ruta
          </button>

          <button class="btn-secondary"
                  *ngIf="creandoRuta && esAdmin"
                  (click)="limpiarMapa()">
            Limpiar
          </button>

          <button class="btn-danger"
                  *ngIf="creandoRuta && esAdmin"
                  (click)="cancelarCreacion()">
            Cancelar
          </button>
        </div>
      </div>

      <!-- CONTENIDO MAPA -->
      <div class="panel-body map-body">
        
        <!-- Botón flotante para Map Mode -->
        <button class="btn-map-mode" (click)="toggleMapMode()" title="Alternar Vista Satélite">
          {{ isSatelliteMode ? '🗺️ Normal' : '🛰️ Satélite' }}
        </button>

        <div id="mapContainer"></div>
      </div>

    </div>

    <!-- PANEL DE RUTAS REGISTRADAS (DERECHA) -->
    <div class="panel-card routes-panel">
      
      <!-- HEADER RUTAS -->
      <div class="panel-header routes-header">
        <h2>Rutas Registradas</h2>
        <button class="btn-create"
                *ngIf="!creandoRuta && esAdmin"
                (click)="empezarCrearRuta()">
          Crear
        </button>
      </div>

      <!-- LISTA DE RUTAS -->
      <div class="panel-body routes-list-container">
        
        <!-- Cada ruta -->
        <div class="ruta-item" *ngFor="let r of rutas">
          <div class="ruta-color-line" [style.background]="r.color_hex || '#10b981'"></div>
          <div class="ruta-info">
            <div class="ruta-name">{{ r.nombre_ruta }}</div>
            <div class="ruta-points">
              {{ (r.shape.coordinates.length || 0) }} {{ (r.shape.coordinates.length === 1) ? 'punto' : 'puntos' }}
            </div>
          </div>
          <div class="ruta-actions">
            <button class="btn-view" (click)="mostrarRuta(r)">
               Ver
            </button>
          </div>
        </div>

        <!-- Si no hay rutas -->
        <div class="no-routes" *ngIf="rutas.length === 0">
          No hay rutas registradas.
        </div>
      </div>

    </div>

  </div> <!-- FIN map-panels-grid -->

  <!-- MODAL CREAR RUTA -->
  <div class="modal-overlay"
       *ngIf="mostrarModalNombreRuta"
       (click)="mostrarModalNombreRuta = false">

    <div class="modal" (click)="$event.stopPropagation()">
      <h2>Crear Nueva Ruta</h2>

      <div class="modal-form">
        <div class="form-group">
          <label>Nombre de la ruta</label>
          <input type="text"
                 [(ngModel)]="nombreRuta"
                 placeholder="Ej: Calle 6 - Zona Centro"
                 class="form-input"
                 autofocus>
        </div>
      </div>

      <div class="modal-buttons">
        <button class="btn-secondary" (click)="mostrarModalNombreRuta = false">
          Cancelar
        </button>
        <button class="btn-primary" (click)="confirmarNombreRuta()" *ngIf="esAdmin">
          Comenzar a Dibujar
        </button>
      </div>

    </div>
  </div>

</div>
