<div class="dashboard-container">

  <!-- Sidebar -->
  <app-sidebar
    [isOpen]="sidebarOpen"
    [activeSection]="activeSection"
    [menuItems]="menuItems"
    (sectionChange)="onSectionChange($event)"
    (logoutClick)="onLogout()">
  </app-sidebar>

  <!-- Main Content -->
  <main class="main-content">

    <div class="content">

      <!-- Header -->
      <app-header
        [sidebarOpen]="sidebarOpen"
        (toggle)="toggleSidebar()"
        (logout)="onLogout()">
      </app-header>

      <!-- Contenido scrolleable (el header queda fuera) -->
      <div class="page-content">

        <!-- Dynamic content (vehiculos, mapa, etc.) -->
        <router-outlet></router-outlet>

        <!-- SOLO mostrar dashboard si estamos en /main -->
        <div class="dashboard-home" *ngIf="currentRoute === '/main'">

          <!-- Info cards row -->
          <div class="info-cards-row">
            <!-- Rutas activas -->
            <div class="info-card">
              <div class="info-card-header">
                <h3>Rutas activas</h3>
              </div>
              <div class="info-card-body">
                <p class="info-placeholder">Sin rutas activas en este momento</p>
              </div>
              <div class="info-card-footer">
                <button class="link-btn" (click)="verRutaActiva()">Ver más...</button>
              </div>
            </div>

            <!-- Progreso de rutas -->
            <div class="info-card">
              <div class="info-card-header">
                <h3>Progreso de rutas</h3>
              </div>
              <div class="info-card-body">
                <p class="info-placeholder">No hay recorridos en progreso</p>
              </div>
              <div class="info-card-footer">
                <button class="link-btn" (click)="verRutaActiva()">Ver más...</button>
              </div>
            </div>
          </div>

          <!-- Mapa -->
          <div class="map-card">
            <div class="map-wrapper">
              <button class="btn-map-mode" (click)="toggleMapMode()" title="Alternar Vista Satélite">
                {{ isSatelliteMode ? '🗺️ Normal' : '🛰️ Satélite' }}
              </button>
              <div id="mainMapPreview"></div>
            </div>
          </div>

        </div>

      </div> <!-- FIN page-content -->

    </div>

  </main>

</div>
